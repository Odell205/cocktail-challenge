<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocktail Agent Challenge</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #1a1a2e; min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.hero { text-align: center; padding: 40px 20px; }
h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; }
.accent { color: #D04A02; }
.subtitle { font-size: 1.1rem; color: #555; margin-bottom: 30px; }
.card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
input, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 15px; }
input:focus, textarea:focus { outline: 2px solid #D04A02; border-color: #D04A02; }
textarea { min-height: 100px; resize: vertical; }
label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
button { background: #D04A02; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
button:hover { background: #b13d00; }
button:disabled { background: #ccc; cursor: not-allowed; }
button.secondary { background: #1a1a2e; }
button.secondary:hover { background: #000; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
.drink-card { background: white; border-radius: 12px; padding: 25px; border-top: 4px solid #D04A02; box-shadow: 0 2px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
.drink-card:hover { transform: translateY(-4px); }
.drink-card.disabled { opacity: 0.5; cursor: not-allowed; }
.drink-card.voted { border-top-color: #00a86b; background: #f0fdf4; }
.drink-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
.team-name { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.recipe, .pitch { font-size: 0.95rem; line-height: 1.5; margin-bottom: 10px; }
.pitch { font-style: italic; color: #555; }
.qr-container { text-align: center; padding: 30px; }
#qrcode { display: inline-block; padding: 20px; background: white; border-radius: 12px; }
.url-display { font-family: monospace; background: #1a1a2e; color: white; padding: 12px 20px; border-radius: 8px; display: inline-block; margin-top: 15px; font-size: 1rem; word-break: break-all; }
.results-bar { background: #eee; border-radius: 8px; overflow: hidden; height: 50px; margin: 8px 0; }
.results-fill { background: linear-gradient(90deg, #D04A02, #ff6b1a); height: 100%; transition: width 0.5s; display: flex; align-items: center; padding-left: 15px; color: white; font-weight: 600; }
.results-label { display: flex; justify-content: space-between; font-weight: 600; margin-top: 4px; }
.winner-banner { background: linear-gradient(135deg, #D04A02, #ff8c42); color: white; padding: 40px; border-radius: 12px; text-align: center; margin: 20px 0; }
.winner-banner h2 { font-size: 2.5rem; margin-bottom: 10px; }
.stage-indicator { display: inline-block; background: #1a1a2e; color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-bottom: 20px; text-transform: uppercase; }
.admin-controls { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
.badge { display: inline-block; background: #D04A02; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-left: 8px; }
.big-number { font-size: 3rem; font-weight: 800; color: #D04A02; }
.empty-state { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXX",
  appId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode') || 'router';
const app = document.getElementById('app');
let userId = localStorage.getItem('cocktail_user_id');
if (!userId) { userId = 'u_' + Math.random().toString(36).substring(2, 12); localStorage.setItem('cocktail_user_id', userId); }

function renderRouter() {
  db.ref('stage').once('value').then(function(snap) {
    var stage = snap.val() || 'submit';
    if (stage === 'submit') window.location.href = '?mode=submit';
    else if (stage === 'vote') window.location.href = '?mode=vote';
    else if (stage === 'results') window.location.href = '?mode=results';
    else { app.innerHTML = '<div class="hero"><h1>Cocktail Agent Challenge</h1><p class="subtitle">Waiting for facilitator...</p></div>'; setTimeout(renderRouter, 3000); }
  });
}

function renderSubmit() {
  var existingTeam = localStorage.getItem('cocktail_team_id');
  if (existingTeam) {
    db.ref('teams/' + existingTeam).once('value').then(function(snap) {
      if (snap.exists()) {
        var t = snap.val();
        app.innerHTML = '<div class="hero"><h1>You are In!</h1><div class="stage-indicator">Submission Received</div></div><div class="card"><div class="team-name">' + t.teamName + '</div><div class="drink-name">' + t.drinkName + '</div><p class="recipe"><strong>Recipe:</strong> ' + t.recipe + '</p><p class="pitch">' + t.pitch + '</p></div><div class="card" style="text-align:center;"><p>Waiting for voting to open...</p><button class="secondary" onclick="resetSubmission()" style="margin-top:15px;">Edit Submission</button></div>';
        db.ref('stage').on('value', function(s) { if (s.val() === 'vote') window.location.href = '?mode=vote'; });
      } else showSubmitForm();
    });
  } else showSubmitForm();
}

function showSubmitForm() {
  app.innerHTML = '<div class="hero"><h1>Submit Your <span class="accent">Drink</span></h1><p class="subtitle">One submission per team. Team captain fills this out.</p></div><div class="card"><label>Team Name</label><input id="teamName" placeholder="e.g., The Prompt Engineers" maxlength="40"><label>Drink Name</label><input id="drinkName" placeholder="e.g., The Deductible" maxlength="40"><label>Recipe / Ingredients</label><textarea id="recipe" placeholder="2 oz bourbon, ginger syrup, lemon..." maxlength="300"></textarea><label>One-Line Pitch</label><input id="pitch" placeholder="Why would someone order this tonight?" maxlength="120"><button onclick="submitTeam()">Submit Drink</button></div>';
}

function resetSubmission() {
  if (confirm('Edit your submission?')) { localStorage.removeItem('cocktail_team_id'); showSubmitForm(); }
}

function submitTeam() {
  var teamName = document.getElementById('teamName').value.trim();
  var drinkName = document.getElementById('drinkName').value.trim();
  var recipe = document.getElementById('recipe').value.trim();
  var pitch = document.getElementById('pitch').value.trim();
  if (!teamName || !drinkName || !recipe || !pitch) { alert('Please fill in all fields.'); return; }
  var existing = localStorage.getItem('cocktail_team_id');
  var teamId = existing || 'team_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
  db.ref('teams/' + teamId).set({ teamName: teamName, drinkName: drinkName, recipe: recipe, pitch: pitch, submittedBy: userId, timestamp: Date.now() }).then(function() {
    localStorage.setItem('cocktail_team_id', teamId);
    renderSubmit();
  });
}

function renderVote() {
  var myTeamId = localStorage.getItem('cocktail_team_id');
  db.ref('teams').on('value', function(snap) {
    var teams = snap.val() || {};
    db.ref('votes/' + userId).once('value').then(function(voteSnap) {
      var myVote = voteSnap.val();
      var html = '<div class="hero"><h1>Vote for Your <span class="accent">Favorite</span></h1><p class="subtitle">' + (myTeamId ? 'You cannot vote for your own team.' : 'Tap the drink you would most likely order tonight.') + '</p>' + (myVote ? '<div class="stage-indicator">Vote Recorded</div>' : '') + '</div><div class="team-grid">';
      var teamKeys = Object.keys(teams);
      if (teamKeys.length === 0) html += '<div class="empty-state">No submissions yet.</div>';
      teamKeys.forEach(function(tid) {
        var t = teams[tid];
        var isOwnTeam = tid === myTeamId;
        var isVoted = myVote === tid;
        var disabled = isOwnTeam || (myVote && !isVoted);
        html += '<div class="drink-card ' + (isVoted ? 'voted' : '') + ' ' + (disabled ? 'disabled' : '') + '" onclick="' + (disabled ? '' : "castVote('" + tid + "')") + '"><div class="team-name">' + t.teamName + ' ' + (isOwnTeam ? '<span class="badge">YOUR TEAM</span>' : '') + '</div><div class="drink-name">' + t.drinkName + '</div><p class="recipe"><strong>Recipe:</strong> ' + t.recipe + '</p><p class="pitch">' + t.pitch + '</p>' + (isVoted ? '<p style="color:#00a86b;font-weight:600;margin-top:10px;">Your vote</p>' : '') + '</div>';
      });
      html += '</div>';
      app.innerHTML = html;
    });
  });
  db.ref('stage').on('value', function(s) { if (s.val() === 'results') window.location.href = '?mode=results'; });
}

function castVote(teamId) { db.ref('votes/' + userId).set(teamId).then(function() { renderVote(); }); }

function renderResults() {
  db.ref('teams').on('value', function(teamSnap) {
    db.ref('votes').on('value', function(voteSnap) {
      var teams = teamSnap.val() || {};
      var votes = voteSnap.val() || {};
      var counts = {};
      Object.keys(teams).forEach(function(tid) { counts[tid] = 0; });
      Object.values(votes).forEach(function(v) { if (counts[v] !== undefined) counts[v]++; });
      var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
      var totalVotes = Object.values(counts).reduce(function(a, b) { return a + b; }, 0);
      var winnerId = sorted[0];
      var winner = teams[winnerId];
      var html = '';
      if (winner && counts[winnerId] > 0) html += '<div class="winner-banner"><div style="font-size:0.9rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Winner</div><h2>' + winner.drinkName + '</h2><p style="font-size:1.2rem;opacity:0.9;">by ' + winner.teamName + '</p></div>';
      html += '<div class="card"><h2 style="margin-bottom:20px;">Live Results</h2>';
      sorted.forEach(function(tid) {
        var t = teams[tid];
        var pct = totalVotes ? (counts[tid] / totalVotes * 100) : 0;
        html += '<div class="results-label"><span>' + t.drinkName + ' <span style="color:#888;font-weight:400;">- ' + t.teamName + '</span></span><span>' + counts[tid] + ' vote' + (counts[tid] !== 1 ? 's' : '') + '</span></div><div class="results-bar"><div class="results-fill" style="width:' + pct + '%">' + (pct > 15 ? Math.round(pct) + '%' : '') + '</div></div>';
      });
      html += '<p style="margin-top:20px;color:#888;text-align:center;">Total votes: ' + totalVotes + '</p></div>';
      app.innerHTML = html;
    });
  });
}

function renderAdmin() {
  var baseUrl = window.location.origin + window.location.pathname;
  db.ref('stage').on('value', function(stageSnap) {
    var stage = stageSnap.val() || 'submit';
    db.ref('teams').on('value', function(teamSnap) {
      db.ref('votes').on('value', function(voteSnap) {
        var teams = teamSnap.val() || {};
        var votes = voteSnap.val() || {};
        var teamCount = Object.keys(teams).length;
        var voteCount = Object.keys(votes).length;
        var html = '<div class="hero"><h1>Facilitator Control</h1><div class="stage-indicator">Current Stage: ' + stage.toUpperCase() + '</div></div><div class="card qr-container"><h2>Scan to Join</h2><p style="color:#888;margin-bottom:20px;">Attendees scan this QR to submit and vote.</p><div id="qrcode"></div><div class="url-display">' + baseUrl + '</div></div><div class="card"><h2>Controls</h2><div class="admin-controls"><button onclick="setStage(\'submit\')" ' + (stage==='submit'?'disabled':'') + '>1. Open Submissions</button><button onclick="setStage(\'vote\')" ' + (stage==='vote'?'disabled':'') + '>2. Open Voting</button><button onclick="setStage(\'results\')" ' + (stage==='results'?'disabled':'') + '>3. Reveal Results</button><button class="secondary" onclick="resetAll()">Reset Everything</button></div><div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;"><div><div class="big-number">' + teamCount + '</div><div>Teams Submitted</div></div><div><div class="big-number">' + voteCount + '</div><div>Votes Cast</div></div></div></div>';
        if (stage === 'vote' || stage === 'results') {
          var counts = {};
          Object.keys(teams).forEach(function(tid) { counts[tid] = 0; });
          Object.values(votes).forEach(function(v) { if (counts[v] !== undefined) counts[v]++; });
          var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
          var total = Object.values(counts).reduce(function(a, b) { return a + b; }, 0);
          html += '<div class="card"><h2>Live Voting</h2>';
          sorted.forEach(function(tid) {
            var t = teams[tid];
            var pct = total ? (counts[tid] / total * 100) : 0;
            html += '<div class="results-label"><span>' + t.drinkName + ' - ' + t.teamName + '</span><span>' + counts[tid] + '</span></div><div class="results-bar"><div class="results-fill" style="width:' + pct + '%">' + (pct > 10 ? Math.round(pct)+'%' : '') + '</div></div>';
          });
          html += '</div>';
        }
        html += '<div class="card"><h2>Submissions</h2>';
        if (teamCount === 0) html += '<div class="empty-state">No submissions yet.</div>';
        else {
          html += '<div class="team-grid">';
          Object.keys(teams).forEach(function(tid) {
            var t = teams[tid];
            html += '<div class="drink-card"><div class="team-name">' + t.teamName + '</div><div class="drink-name">' + t.drinkName + '</div><p class="recipe"><strong>Recipe:</strong> ' + t.recipe + '</p><p class="pitch">' + t.pitch + '</p><button class="secondary" style="margin-top:10px;font-size:0.8rem;padding:6px 12px;" onclick="deleteTeam(\'' + tid + '\')">Remove</button></div>';
          });
          html += '</div>';
        }
        html += '</div>';
        app.innerHTML = html;
        QRCode.toCanvas(document.getElementById('qrcode'), baseUrl, { width: 240, margin: 1 });
      });
    });
  });
}

function setStage(s) { db.ref('stage').set(s); }
function deleteTeam(tid) { if (confirm('Remove this team?')) db.ref('teams/' + tid).remove(); }
function resetAll() { if (confirm('Reset everything?')) { db.ref('teams').remove(); db.ref('votes').remove(); db.ref('stage').set('submit'); } }

if (mode === 'admin') renderAdmin();
else if (mode === 'submit') renderSubmit();
else if (mode === 'vote') renderVote();
else if (mode === 'results') renderResults();
else renderRouter();
</script>
</body>
</html>
